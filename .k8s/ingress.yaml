apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sistema-Ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec: 
  rules:
    - host: sistema.seudominio.com
      http:
        path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
        backend:
          service:
          name: backend-service
          port:
            name: 8080