<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Manutenção</title>
    <style>
        /* Um visual simples e limpo para a aula */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #e9ecef; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #007bff; margin-bottom: 30px; }
        
        /* Estilo do Formulário */
        form { display: grid; gap: 15px; margin-bottom: 40px; padding: 20px; border: 1px solid #dee2e6; border-radius: 8px; }
        label { font-weight: bold; }
        input, textarea { padding: 12px; border: 1px solid #ced4da; border-radius: 6px; width: 100%; box-sizing: border-box; }
        button { background-color: #28a745; color: white; cursor: pointer; border: none; padding: 15px; font-weight: bold; border-radius: 6px; transition: 0.3s; }
        button:hover { background-color: #218838; }

        /* Estilo da Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 15px; border-bottom: 1px solid #dee2e6; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f8f9fa; }
        .badge-codigo { background: #6c757d; color: white; padding: 4px 8px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registro de Manutenções</h1>
        
        <form id="formManutencao">
            <div>
                <label>Descrição do Problema:</label>
                <input type="text" id="descricao" required
            <div>
                <label>Ação Realizada:</label>
                <textarea id="acao_realizada" rows="3" required></textarea>
            </div>
            <button type="submit">Salvar Requisição</button>
        </form>

        <h2>Histórico de Atividades</h2>
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Data/Hora</th>
                    <th>Descrição</th>
                    <th>O que foi feito</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                </tbody>
        </table>
    </div>

    <script>
        const form = document.getElementById('formManutencao');
        const tabela = document.getElementById('tabelaCorpo');

        // Busca as requisições no Banco de Dados via API (Python)
        async function carregarRequisicoes() {
            const resposta = await fetch('/api/requisicoes');
            const dados = await resposta.json();
            tabela.innerHTML = ''; // Limpa a tabela antes de atualizar
            
            dados.forEach(req => {
                const linha = `<tr>
                    <td><span class="badge-codigo">${req.codigo}</span></td>
                    <td>${req.data} <br> <small>${req.hora}</small></td>
                    <td>${req.descricao}</td>
                    <td>${req.acao_realizada}</td>
                </tr>`;
                tabela.innerHTML += linha;
            });
        }

        // Envia os dados do formulário para o Python salvar no Postgres
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const descricao = document.getElementById('descricao').value;
            const acao_realizada = document.getElementById('acao_realizada').value;

            await fetch('/api/requisicoes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ descricao, acao_realizada })
            });

            form.reset(); // Limpa os campos
            carregarRequisicoes(); // Atualiza a lista na tela
        });

        // Carregar a lista assim que abrir a página
        carregarRequisicoes();
    </script>
</body>
</html>
