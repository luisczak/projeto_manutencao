services:

  postgres_local:
    image: postgres:15-alpine
    container_name: manutencao_postgres_local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: manutencao_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d manutencao_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - manutencao_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manutencao_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres_local:5432/manutencao_db
      DEBUG: "true"
    ports:
      - "5000:5000"
    depends_on:
      postgres_local:
        condition: service_healthy
    networks:
      - manutencao_network
    restart: always
    command: python src/app.py

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: manutencao_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - manutencao_network
    restart: always

volumes:
  postgres_local_data:

networks:
  manutencao_network:
    driver: bridge